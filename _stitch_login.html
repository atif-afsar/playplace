<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Play Place School Portal - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;700;800;900&amp;family=Fredoka:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-on-surface": "#e8f2ff",
                    "secondary": "#686000",
                    "tertiary-fixed-dim": "#90d792",
                    "error": "#ba1a1a",
                    "on-surface-variant": "#56423c",
                    "on-primary-container": "#752305",
                    "on-primary": "#ffffff",
                    "primary-fixed-dim": "#ffb59e",
                    "surface-variant": "#d1e4fb",
                    "surface-bright": "#f7f9ff",
                    "secondary-fixed-dim": "#d6c953",
                    "on-error-container": "#93000a",
                    "on-secondary-container": "#6d6400",
                    "surface-container-lowest": "#ffffff",
                    "on-surface": "#091d2e",
                    "on-secondary-fixed": "#1f1c00",
                    "surface-dim": "#c9dcf3",
                    "surface-container-low": "#edf4ff",
                    "outline-variant": "#ddc0b8",
                    "on-primary-fixed": "#3a0b00",
                    "background": "#f7f9ff",
                    "secondary-container": "#f0e269",
                    "error-container": "#ffdad6",
                    "surface-container-high": "#d9eaff",
                    "outline": "#89726b",
                    "on-tertiary-container": "#004a18",
                    "tertiary-fixed": "#abf4ac",
                    "on-error": "#ffffff",
                    "on-primary-fixed-variant": "#7f2a0d",
                    "surface": "#f7f9ff",
                    "on-secondary": "#ffffff",
                    "inverse-surface": "#203243",
                    "primary": "#9f4122",
                    "surface-tint": "#9f4122",
                    "on-background": "#091d2e",
                    "on-tertiary": "#ffffff",
                    "primary-container": "#ff8a65",
                    "on-tertiary-fixed-variant": "#07521d",
                    "surface-container-highest": "#d1e4fb",
                    "secondary-fixed": "#f3e56c",
                    "on-secondary-fixed-variant": "#4e4800",
                    "primary-fixed": "#ffdbd0",

                    "tertiary": "#286b33",

            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",

            "spacing": {
                    "gutter": "24px",
                    "unit": "8px",
                    "container-max": "1200px",
                    "margin-mobile": "16px",
                    "margin-desktop": "64px"
            },
            "fontFamily": {
                    "fredoka": ["Fredoka", "sans-serif"],
                    "body-lg": ["Nunito Sans"],
                    "headline-sm": ["Nunito Sans"],
                    "label-lg": ["Nunito Sans"],
                    "headline-lg-mobile": ["Nunito Sans"],
                    "headline-lg": ["Nunito Sans"],
                    "body-md": ["Nunito Sans"],
                    "headline-md": ["Nunito Sans"],
                    "display-lg": ["Nunito Sans"]

            "fontSize": {
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "500"}],

                    "label-lg": ["14px", {"lineHeight": "20px", "fontWeight": "700"}],
                    "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "800"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "800"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "500"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "800"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "900"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .bouncy-button {
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 0 #752305;
        }
        .bouncy-button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #752305;
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.6;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            from { transform: translateX(-100%); }
            to { transform: translateX(100vw); }
        }

        .custom-tab-active {
            background-color: #ff8a65;
            color: white;
        }

        body {
            font-family: 'Nunito Sans', sans-serif;
            overflow-x: hidden;
        }
    </style>
</head>
<body class="bg-surface-container-low min-h-screen relative flex items-center justify-center p-4">
<!-- Atmospheric Sky Background with Floating Clouds -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
<!-- Sun Decoration -->
<div class="absolute -top-10 -left-10 w-48 h-48 bg-secondary-container rounded-full opacity-40 blur-3xl"></div>
<!-- Generated Clouds -->
<div class="cloud w-32 h-12 top-10" style="animation-delay: -2s;"></div>
<div class="cloud w-48 h-16 top-40" style="animation-delay: -10s;"></div>
<div class="cloud w-24 h-8 top-80" style="animation-delay: -5s;"></div>
<div class="cloud w-40 h-14 top-1/2" style="animation-delay: -15s;"></div>
</div>
<main class="relative z-10 w-full max-w-container-max mx-auto flex flex-col md:flex-row items-center justify-center gap-margin-desktop">
<!-- Illustration Section -->
<div class="hidden md:flex w-full md:w-1/2 flex-col items-center justify-center animate-bounce-slow">
<div class="relative group">
<img alt="Play Place Student Illustration" class="w-full h-auto drop-shadow-xl transform group-hover:scale-105 transition-transform duration-500" src="https://lh3.googleusercontent.com/aida/AP1WRLvObHZlMG-QmfgrwI97OHglxKaA0tkUAUaibiDtKfmA19a886jX2zBzJS44tCwkX4Z0HsyMzrm5nRsBJq4MQupTNSaY0K52AFi9ArXP8vv93JP_hvCMCTyvRyojc-AQ8nl8pdwJq6YOvIO_h91chc0dt9jjdIE1a0KkS2HlS5uD2D5N-kn3qDYNStcfRLOzgD7qd2O95vXw6leiebZlCXT-nddIYQa1aT4--y03J0qq1oVL8FlXijo06x0"/>
<!-- Decorative Character Topper peek -->
<div class="absolute -top-12 left-1/2 -translate-x-1/2 text-primary">
<span class="material-symbols-outlined text-[64px]" style="font-variation-settings: 'FILL' 1;">face_5</span>
</div>
</div>
<h1 class="mt-8 font-fredoka font-bold text-headline-lg text-primary text-center">Ready for School?</h1>
<p class="font-body-lg text-on-surface-variant text-center max-w-sm mt-2">Sign in to explore your playground of learning!</p>
</div>
<!-- Login Card Section -->
<div class="w-full max-w-[480px]">
<div class="bg-white rounded-xl shadow-md shadow-primary/10 border-[3px] border-surface-variant p-unit md:p-8 relative">
<!-- Logo Container -->
<div class="flex justify-center -mt-16 mb-8">
<div class="bg-white p-4 rounded-full border-[3px] border-surface-variant shadow-lg">
<img alt="Play Place Logo" class="w-20 h-20 object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAvKSuIuDCT5yEAu8dKAYZKC0RxJq4k5vXA1t3Yf8Z1Ogv1AlQmnwoRsJXbzave4hlpgMFjtBkesaI0m89YqOBkBqHTzo_lYABi7r0XBRS3CTwSxVv7X5eevtGPJi_6n049Ce_UY3UnJ6t3wm1Kfv8S1R2BgCADmFTWzPPnFFy6wwkvMmNWUmLTvfV_ovV2deL9LlFVw0Enerh1O9fKZwwf1YbohWTjVXqzKiFRTPpz13iW_XMNSV6TDCNL9s8TzLR4Bw"/>
</div>
</div>
<div class="text-center mb-8">
<h2 class="font-fredoka text-headline-md text-on-background">Welcome Back!</h2>
<p class="font-body-md text-on-surface-variant">Please enter your details to login</p>
</div>
<!-- Tabs -->
<div class="flex p-1 bg-surface-container-high rounded-full mb-8" id="login-tabs">
<button class="flex-1 py-3 px-4 rounded-full font-fredoka font-semibold text-label-lg transition-all duration-300 custom-tab-active" id="tab-parent" onclick="switchTab('parent')">
                        Parent Login
                    </button>
<button class="flex-1 py-3 px-4 rounded-full font-fredoka font-semibold text-label-lg text-on-surface-variant hover:bg-surface-variant/50 transition-all duration-300" id="tab-admin" onclick="switchTab('admin')">
                        Admin Login
                    </button>
</div>
<!-- Form -->
<form class="space-y-6" onsubmit="event.preventDefault();">
<div class="space-y-2">
<label class="font-fredoka font-semibold text-label-lg text-primary ml-2">Email or Username</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors">person</span>
<input class="w-full pl-12 pr-4 py-4 rounded-lg border-[3px] border-surface-variant focus:border-secondary-container focus:ring-0 font-body-lg placeholder:text-outline-variant transition-all outline-none" placeholder="e.g. happy.parent@mail.com" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="font-fredoka font-semibold text-label-lg text-primary ml-2">Secret Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors">lock</span>
<input class="w-full pl-12 pr-12 py-4 rounded-lg border-[3px] border-surface-variant focus:border-secondary-container focus:ring-0 font-body-lg placeholder:text-outline-variant transition-all outline-none" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between px-2">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-5 h-5 rounded border-2 border-surface-variant text-primary focus:ring-primary/20" type="checkbox"/>
<span class="font-label-lg text-on-surface-variant group-hover:text-primary transition-colors">Remember me</span>
</label>
<a class="font-label-lg text-primary hover:underline decoration-2 underline-offset-4" href="#">Forgot password?</a>
</div>
<button class="w-full bg-primary-container text-on-primary-container font-fredoka font-bold text-headline-sm py-5 rounded-lg bouncy-button hover:bg-primary-container/90 transition-all flex items-center justify-center gap-2 mt-4" type="submit">
                        Login Now
                        <span class="material-symbols-outlined">rocket_launch</span>
</button>
</form>
<!-- Help Link -->
<div class="mt-8 text-center">
<p class="font-body-md text-on-surface-variant">New to Play Place? <a class="text-tertiary font-bold hover:underline" href="#">Register your child</a></p>
</div>
</div>
<!-- Footer Decoration -->
<div class="flex justify-center mt-8 gap-4 opacity-40">
<span class="material-symbols-outlined text-tertiary">potted_plant</span>
<span class="material-symbols-outlined text-secondary-fixed-dim">wb_sunny</span>
<span class="material-symbols-outlined text-primary-container">toys</span>
</div>
</div>
</main>
<!-- Footer Component logic included via styles above and structure here -->
<footer class="fixed bottom-0 left-0 w-full py-4 px-gutter flex justify-center items-center z-20 pointer-events-none">
<div class="bg-white/80 backdrop-blur-sm px-6 py-2 rounded-full border border-surface-variant pointer-events-auto">
<p class="font-label-lg text-on-surface-variant">© 2024 Play Place International School. <span class="hidden md:inline">Powered by Bal Vatika.</span></p>
</div>
</footer>
<script>
        function switchTab(type) {
            const parentBtn = document.getElementById('tab-parent');
            const adminBtn = document.getElementById('tab-admin');
            
            if (type === 'parent') {
                parentBtn.classList.add('custom-tab-active', 'text-white');
                parentBtn.classList.remove('text-on-surface-variant');
                adminBtn.classList.remove('custom-tab-active', 'text-white');
                adminBtn.classList.add('text-on-surface-variant');
            } else {
                adminBtn.classList.add('custom-tab-active', 'text-white');
                adminBtn.classList.remove('text-on-surface-variant');
                parentBtn.classList.remove('custom-tab-active', 'text-white');
                parentBtn.classList.add('text-on-surface-variant');
            }
        }

        // Simple floating animation for clouds
        document.querySelectorAll('.cloud').forEach((cloud, index) => {
            const speed = 15 + Math.random() * 20;
            cloud.style.animationDuration = `${speed}s`;
            cloud.style.left = `-${Math.random() * 200}px`;
        });
    </script>
</body></html>
